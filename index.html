<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IIT Madras Intro</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background : black;
      font-family: "Georgia", serif;
      color: white;
      text-align: center;
    }

    /* Container */
    .container {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Quotes */
    .quote {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 24px;
      opacity: 0;
      animation: fadeInOut 6s ease forwards;
    }

    .quote:nth-child(1) { animation-delay: 0s; }
    .quote:nth-child(2) { animation-delay: 6s; }
    .quote:nth-child(3) { animation-delay: 12s; }

    @keyframes fadeInOut {
      0% { opacity: 0; }
      10% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Sunrise Background */
    .sun {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, #ffcc00, #ff6600);
      border-radius: 50%;
      position: absolute;
      bottom: -200px;
      left: 50%;
      transform: translateX(-50%);
      animation: rise 8s ease-in-out forwards;
      animation-delay: 18s;
      box-shadow: 0 0 80px 30px rgba(255, 204, 0, 0.5);
    }

    @keyframes rise {
      to { bottom: 200px; }
    }

    /* Clouds */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      animation: moveClouds 40s linear infinite;
    }
    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud1 {
      width: 120px; height: 60px;
      top: 80px; left: -150px;
      animation-delay: 20s;
    }
    .cloud2 {
      width: 150px; height: 80px;
      top: 150px; left: -200px;
    }
    .cloud::before {
      width: 80px; height: 80px;
      top: -20px; left: 10px;
    }
    .cloud::after {
      width: 60px; height: 60px;
      top: -10px; left: 60px;
    }
    @keyframes moveClouds {
      to { transform: translateX(120vw); }
    }

    /* Birds */
    .bird {
      position: absolute;
      top: 250px;
      left: -50px;
      width: 40px;
      height: 20px;
      background: transparent;
      border-top: 3px solid black;
      border-left: 3px solid transparent;
      border-right: 3px solid transparent;
      transform: rotate(-20deg);
      animation: fly 12s linear infinite;
      animation-delay: 18s;
    }
    .bird::after {
      content: '';
      position: absolute;
      top: 0;
      left: 20px;
      width: 40px;
      height: 20px;
      border-top: 3px solid black;
      transform: rotate(40deg);
    }
    @keyframes fly {
      to { transform: translateX(120vw) translateY(-100px); }
    }

    /* Logo + Text */
    .logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      animation: showLogo 3s ease forwards;
      animation-delay: 26s;
    }
    .logo-circle {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: maroon;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      font-weight: bold;
      box-shadow: 0 0 50px gold;
    }
    .tagline {
      margin-top: 20px;
      font-size: 20px;
      color: gold;
    }
    @keyframes showLogo {
      from { opacity: 0; transform: translate(-50%, -60%) scale(0.5); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Quotes -->
    <div class="quote">“Knowledge is power. Knowledge shared is power multiplied.”</div>
    <div class="quote">“Excellence is not a skill, it’s an attitude.”</div>
    <div class="quote">“Proud to be an IITian.”</div>

    <!-- Sunrise -->
    <div class="sun"></div>

    <!-- Clouds -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>

    <!-- Birds -->
    <div class="bird"></div>

    <!-- Logo -->
    <div class="logo">
      <div class="logo-circle">IIT MADRAS</div>
      <div class="tagline">Proud to be an IITian</div>
    </div>
  </div>
</body>
</html>
